# SPDX-License-Identifier: LGPL-2.1-or-later
#
# ci.yml — One job, one matrix, one container.
#
# Architecture:
#   * One prebuilt container image (oreo-kernel-dev) carries the entire
#     toolchain — gcc, clang, OCCT 7.7, Boost, Qt6, Eigen,
#     nlohmann-json, GTest. Built and pushed by .github/workflows/dev-image.yml.
#   * One workflow job (`build`) runs inside that container.
#   * One build script (ci/build.sh) takes env vars and does
#     configure → build → test → optional fuzz/gates.
#   * The matrix below enumerates the configurations we care about;
#     adding a new one is one line, not a copy-pasted job block.
#
# Windows MSVC is intentionally not in this workflow — the kernel is
# portable C++ and the Linux container is the authoritative gate.
# Maintainers verify Windows locally on every push (build_msvc/ +
# ctest -C Release). If Windows-specific CI is later required, it
# belongs in its own workflow file with its own toolchain story
# (Windows containers + prebuilt OCCT, or vcpkg with a primed cache).

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/oreo-kernel-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    strategy:
      # Surface every failing config in one run instead of bailing on
      # the first red square — debugging multiple regressions in
      # parallel is much faster than serial.
      fail-fast: false
      matrix:
        include:
          # GCC release, full legacy API, runs the policy gates
          # (grep_gate + spdx_check). This is the canonical "is the
          # tree green" job.
          - name: gcc-release
            cc: gcc
            cxx: g++
            build_type: Release
            sanitizer: none
            legacy_api: ON
            build_fuzzers: OFF
            run_gates: 1
            build_dir: build

          # No-legacy acceptance gate — proves the server-safe build
          # configures and tests cleanly.
          - name: gcc-no-legacy
            cc: gcc
            cxx: g++
            build_type: Release
            sanitizer: none
            legacy_api: OFF
            build_fuzzers: OFF
            run_gates: 0
            build_dir: build_nolegacy

          # Clang AddressSanitizer + UndefinedBehaviorSanitizer.
          # Catches OOB / use-after-free / int overflow / null deref
          # the unsanitized build can't see.
          - name: clang-asan-ubsan
            cc: clang
            cxx: clang++
            build_type: RelWithDebInfo
            sanitizer: address+undefined
            legacy_api: ON
            build_fuzzers: OFF
            run_gates: 0
            build_dir: build_san

          # libFuzzer 60s-per-harness smoke run on the seed corpora.
          # Inherits ASan+UBSan so any crash report is a real bug.
          - name: clang-fuzz
            cc: clang
            cxx: clang++
            build_type: RelWithDebInfo
            sanitizer: address+undefined
            legacy_api: ON
            build_fuzzers: ON
            run_gates: 0
            build_dir: build_fuzz

    steps:
      - uses: actions/checkout@v4

      - name: Build + test (${{ matrix.name }})
        env:
          BUILD_DIR:     ${{ matrix.build_dir }}
          CC:            ${{ matrix.cc }}
          CXX:           ${{ matrix.cxx }}
          BUILD_TYPE:    ${{ matrix.build_type }}
          LEGACY_API:    ${{ matrix.legacy_api }}
          SANITIZER:     ${{ matrix.sanitizer }}
          BUILD_FUZZERS: ${{ matrix.build_fuzzers }}
          RUN_GATES:     ${{ matrix.run_gates }}
        run: ci/build.sh

      - name: Upload fuzzer crash reproducers (if any)
        if: failure() && matrix.build_fuzzers == 'ON'
        uses: actions/upload-artifact@v4
        with:
          name: fuzzer-crashes-${{ matrix.name }}
          path: |
            crash-*
            leak-*
            timeout-*
          if-no-files-found: ignore
