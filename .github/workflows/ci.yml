# SPDX-License-Identifier: LGPL-2.1-or-later
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Shared configuration ──────────────────────────────────────────────
#
# All Linux jobs run inside the prebuilt oreo-kernel-dev container
# (Ubuntu 24.04 + OCCT 7.7 + Boost + Qt6 + Eigen + nlohmann-json + GTest
# + Clang/GCC, see docker/Dockerfile). The container exports
# CMAKE_PREFIX_PATH and OpenCASCADE_DIR so a bare `cmake -S . -B build`
# Just Works — no per-job apt install, no flakey OCCT discovery.
#
# Bootstrap: the image must exist at ghcr.io/<owner>/oreo-kernel-dev
# before this workflow can pull it. Run `.github/workflows/dev-image.yml`
# manually once after cloning, then it auto-rebuilds whenever the
# Dockerfile changes.
#
# Windows MSVC: vcpkg-from-source OCCT compile is 3-4 hours on a fresh
# GitHub runner — too slow to gate every PR. The job runs with
# `continue-on-error: true` so it primes the cache opportunistically
# without blocking CI green. Proper Windows CI (Windows containers
# with OCCT preinstalled) is post-RC1 work.

env:
  DEV_IMAGE: ghcr.io/${{ github.repository_owner }}/oreo-kernel-dev:latest

jobs:
  # ────────────────────────────────────────────────────────────
  # Linux GCC release build + full test suite
  # ────────────────────────────────────────────────────────────
  linux-gcc-release:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/oreo-kernel-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOREO_ENABLE_LEGACY_API=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Grep gate (identity v1 squeeze)
        run: ci/grep_gate.sh

      - name: SPDX header gate
        run: ci/spdx_check.sh --strict

  # ────────────────────────────────────────────────────────────
  # Linux GCC no-legacy build + tests (acceptance gate for the
  # server-safe configuration)
  # ────────────────────────────────────────────────────────────
  linux-gcc-nolegacy:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/oreo-kernel-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure (no-legacy)
        run: |
          cmake -S . -B build_nolegacy \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DOREO_ENABLE_LEGACY_API=OFF

      - name: Build
        run: cmake --build build_nolegacy --parallel

      - name: Test
        run: ctest --test-dir build_nolegacy --output-on-failure

  # ────────────────────────────────────────────────────────────
  # Linux Clang + AddressSanitizer + UndefinedBehaviorSanitizer
  # Catches memory bugs, OOB, use-after-free, integer overflow,
  # null-pointer deref, etc.
  # ────────────────────────────────────────────────────────────
  linux-clang-asan-ubsan:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/oreo-kernel-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure (ASan + UBSan)
        run: |
          cmake -S . -B build_san \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DOREO_ENABLE_SANITIZER=address+undefined \
            -DOREO_ENABLE_LEGACY_API=ON

      - name: Build
        run: cmake --build build_san --parallel

      - name: Test (sanitizers active)
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build_san --output-on-failure

  # ────────────────────────────────────────────────────────────
  # libFuzzer smoke run (60s per harness)
  # ────────────────────────────────────────────────────────────
  linux-clang-fuzz:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/oreo-kernel-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure (libFuzzer)
        run: |
          cmake -S . -B build_fuzz \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DOREO_BUILD_FUZZERS=ON \
            -DOREO_ENABLE_SANITIZER=address+undefined \
            -DOREO_ENABLE_LEGACY_API=ON

      - name: Build fuzzers
        run: |
          cmake --build build_fuzz --parallel \
            --target fuzz_deserialize fuzz_step_import fuzz_feature_tree_json

      - name: Smoke-run fuzzers (60s each)
        run: |
          set -e
          for h in fuzz_deserialize fuzz_step_import fuzz_feature_tree_json; do
            echo "=== running $h ==="
            ./build_fuzz/fuzzers/$h \
              -max_total_time=60 \
              -timeout=10 \
              -rss_limit_mb=2048 \
              corpora/$h/ || (echo "$h crashed"; exit 1)
          done

      - name: Upload crash reproducers (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzer-crashes
          path: |
            crash-*
            leak-*
            timeout-*
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────────────
  # Windows MSVC build + tests using the runner's preinstalled
  # vcpkg + manifest mode. NON-BLOCKING (continue-on-error: true)
  # because OCCT-from-source via vcpkg is 3-4h on a fresh runner.
  # ────────────────────────────────────────────────────────────
  windows-msvc:
    runs-on: windows-2022
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build_msvc/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build_msvc `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DOREO_ENABLE_LEGACY_API=ON

      - name: Build
        run: cmake --build build_msvc --config Release

      - name: Test
        shell: pwsh
        run: ctest --test-dir build_msvc -C Release --output-on-failure
