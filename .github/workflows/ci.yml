# SPDX-License-Identifier: LGPL-2.1-or-later
#
# ci.yml — One job, one matrix, one container.
#
# Architecture:
#   * One prebuilt container image (oreo-kernel-dev) carries the entire
#     toolchain — gcc, clang, OCCT 7.9.3 (source-built, pinned), Boost,
#     Qt6, Eigen, nlohmann-json, GTest. Built and pushed by the
#     dev-image.yml workflow.
#   * One workflow job (`build`) runs inside that container.
#   * One build script (ci/build.sh) takes env vars and does
#     configure → build → test → optional fuzz/gates.
#   * The matrix below enumerates the configurations we care about;
#     adding a new one is one line, not a copy-pasted job block.
#
# oreo-kernel is a Docker-first project. All builds happen inside the
# oreo-kernel-dev container — no native Windows / macOS / Linux host
# builds. The determinism test suite enforces byte-identical output
# across all consumers of the image, so using the same OCCT bits
# everywhere is a correctness requirement, not a convenience. See
# docs/deployment.md for the full story.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    container:
      # GHCR repository paths must be lowercase. `github.repository_owner`
      # preserves the original casing (e.g. ABHINAVVV13), which Docker
      # rejects at ref-parse time. dev-image.yml pushes to the lowercased
      # path, so we hardcode the same literal here. If the repo is ever
      # forked to a different owner, update this one line (or swap to a
      # prep-job that outputs a lowercased owner — container.image is
      # evaluated before steps run, so it can't compute its own value).
      image: ghcr.io/abhinavvv13/oreo-kernel-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # ThreadSanitizer calls `personality(ADDR_NO_RANDOMIZE)` at startup
      # to disable ASLR (its shadow-memory layout depends on fixed
      # addresses). The Docker default seccomp profile blocks that
      # syscall, so TSan-instrumented binaries crash at launch with
      # "CHECK failed: tsan_platform_linux.cpp:282". Adding SYS_PTRACE +
      # unconfined seccomp is the documented fix. ASan / UBSan / GCC
      # builds don't need it but the option is harmless for them, and
      # GitHub Actions' `container:` block can't vary options per matrix
      # cell without a wrapper script.
      options: --cap-add=SYS_PTRACE --security-opt seccomp=unconfined

    strategy:
      # Surface every failing config in one run instead of bailing on
      # the first red square — debugging multiple regressions in
      # parallel is much faster than serial.
      fail-fast: false
      matrix:
        include:
          # GCC release, full legacy API, runs the policy gates
          # (grep_gate + spdx_check). This is the canonical "is the
          # tree green" job.
          - name: gcc-release
            cc: gcc
            cxx: g++
            build_type: Release
            sanitizer: none
            legacy_api: ON
            build_fuzzers: OFF
            run_gates: 1
            build_dir: build

          # No-legacy acceptance gate — proves the server-safe build
          # configures and tests cleanly.
          - name: gcc-no-legacy
            cc: gcc
            cxx: g++
            build_type: Release
            sanitizer: none
            legacy_api: OFF
            build_fuzzers: OFF
            run_gates: 0
            build_dir: build_nolegacy

          # Clang AddressSanitizer + UndefinedBehaviorSanitizer.
          # Catches OOB / use-after-free / int overflow / null deref
          # the unsanitized build can't see.
          - name: clang-asan-ubsan
            cc: clang
            cxx: clang++
            build_type: RelWithDebInfo
            sanitizer: address+undefined
            legacy_api: ON
            build_fuzzers: OFF
            run_gates: 0
            build_dir: build_san

          # Clang ThreadSanitizer. Catches races on shared state that
          # the unsanitized test_concurrency suite walks right past —
          # the 8-thread + parallel-context tests exercise the tag
          # allocator, diagnostic collector, OCCT static guard, and
          # identity registry all at once, which is exactly where a
          # data race is most likely to ship unnoticed. TSan and ASan
          # are mutually exclusive so this is its own CI cell rather
          # than piggy-backing on the ASan+UBSan one.
          #
          # Hard gate as of 2026-04-19: the cell is fully green end-to-
          # end. Historically it was advisory because OCCT 7.9's TBB-
          # backed boolean engine produced unsuppressed races (TSan
          # can't follow TBB's task-queue internals) and a single
          # `libtbb` suppression collided with four loaded TBB shared
          # objects. Both issues are resolved:
          #   * ci/tsan.supp now lists libtbb / libtbbmalloc /
          #     libtbbmalloc_proxy / libtbbbind separately so every
          #     match is unambiguous (TSan's "matched against N
          #     libraries" warning no longer fires).
          #   * A vector<bool> race in test_foundation_battle (bit-
          #     packed storage shared across threads) was replaced
          #     with vector<char>.
          # Treat a red TSan cell as a real regression — either a new
          # OCCT allocator path surfaced (add a narrow called_from_lib
          # entry after auditing) or new oreo code shipped an actual
          # race (fix the code, not the suppression). Do not add
          # blanket `race:.*` entries to tsan.supp; every entry must
          # name a specific symbol / library from an audited report.
          - name: clang-tsan
            cc: clang
            cxx: clang++
            build_type: RelWithDebInfo
            sanitizer: thread
            legacy_api: ON
            build_fuzzers: OFF
            run_gates: 0
            build_dir: build_tsan

          # libFuzzer 60s-per-harness smoke run on the seed corpora.
          # Inherits ASan+UBSan so any crash report is a real bug.
          - name: clang-fuzz
            cc: clang
            cxx: clang++
            build_type: RelWithDebInfo
            sanitizer: address+undefined
            legacy_api: ON
            build_fuzzers: ON
            run_gates: 0
            build_dir: build_fuzz

    steps:
      - uses: actions/checkout@v4

      - name: Build + test (${{ matrix.name }})
        # Every cell is a hard gate. `advisory` is retained as an
        # opt-in escape hatch (set `advisory: 1` on a matrix entry to
        # stop it from failing the job) but no current cell uses it —
        # promote a red advisory cell back to hard only after the
        # underlying race / leak has a known, audited root cause and
        # the suppression is scoped to that root cause.
        continue-on-error: ${{ matrix.advisory == 1 }}
        env:
          BUILD_DIR:     ${{ matrix.build_dir }}
          CC:            ${{ matrix.cc }}
          CXX:           ${{ matrix.cxx }}
          BUILD_TYPE:    ${{ matrix.build_type }}
          LEGACY_API:    ${{ matrix.legacy_api }}
          SANITIZER:     ${{ matrix.sanitizer }}
          BUILD_FUZZERS: ${{ matrix.build_fuzzers }}
          RUN_GATES:     ${{ matrix.run_gates }}
        run: ci/build.sh

      - name: Upload fuzzer crash reproducers (if any)
        if: failure() && matrix.build_fuzzers == 'ON'
        uses: actions/upload-artifact@v4
        with:
          name: fuzzer-crashes-${{ matrix.name }}
          path: |
            crash-*
            leak-*
            timeout-*
          if-no-files-found: ignore
