# SPDX-License-Identifier: LGPL-2.1-or-later
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Shared configuration ──────────────────────────────────────────────
#
# Linux jobs use Ubuntu's apt-packaged OCCT (`libocct-*-dev`). The
# package installs its CMake config at
# `/usr/lib/x86_64-linux-gnu/cmake/opencascade/`, which is on the
# multiarch path that CMake does NOT search by default. We add it
# (along with the Boost / Qt6 / Eigen / nlohmann-json multiarch
# config dirs) via CMAKE_PREFIX_PATH on every configure step.
#
# Windows jobs use the runner's preinstalled vcpkg at
# `C:/vcpkg` (env var $VCPKG_INSTALLATION_ROOT) plus this repo's
# vcpkg.json manifest. Manifest mode picks up the dependency list
# automatically when CMAKE_TOOLCHAIN_FILE points at vcpkg.cmake.

env:
  LINUX_CMAKE_PREFIX: /usr/lib/x86_64-linux-gnu/cmake
  LINUX_OCCT_DIR: /usr/lib/x86_64-linux-gnu/cmake/opencascade

jobs:
  # ────────────────────────────────────────────────────────────
  # Linux GCC release build + full test suite
  # ────────────────────────────────────────────────────────────
  linux-gcc-release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build ripgrep \
            libocct-foundation-dev libocct-modeling-algorithms-dev \
            libocct-modeling-data-dev libocct-ocaf-dev \
            libocct-data-exchange-dev libocct-visualization-dev \
            libgtest-dev libeigen3-dev nlohmann-json3-dev \
            libboost-all-dev qt6-base-dev

      - name: Show OCCT install layout (debug)
        run: |
          echo "── apt OCCT version ──"
          dpkg -l | grep libocct || true
          echo "── CMake config search paths ──"
          ls -la /usr/lib/x86_64-linux-gnu/cmake/ 2>/dev/null | head -30 || true
          ls -la /usr/lib/cmake/ 2>/dev/null | head -30 || true
          echo "── OCCT cmake config locations ──"
          find /usr -name 'OpenCASCADEConfig.cmake' -o -name 'opencascade-config.cmake' 2>/dev/null
          find /usr -name 'OpenCASCADE*.cmake' 2>/dev/null | head -10

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$LINUX_CMAKE_PREFIX" \
            -DOpenCASCADE_DIR="$LINUX_OCCT_DIR" \
            -DOREO_ENABLE_LEGACY_API=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Grep gate (identity v1 squeeze)
        run: ci/grep_gate.sh

      - name: SPDX header gate
        run: ci/spdx_check.sh --strict

  # ────────────────────────────────────────────────────────────
  # Linux GCC no-legacy build + tests (acceptance gate for the
  # server-safe configuration)
  # ────────────────────────────────────────────────────────────
  linux-gcc-nolegacy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libocct-foundation-dev libocct-modeling-algorithms-dev \
            libocct-modeling-data-dev libocct-ocaf-dev \
            libocct-data-exchange-dev libocct-visualization-dev \
            libgtest-dev libeigen3-dev nlohmann-json3-dev \
            libboost-all-dev qt6-base-dev

      - name: Configure (no-legacy)
        run: |
          cmake -S . -B build_nolegacy \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$LINUX_CMAKE_PREFIX" \
            -DOpenCASCADE_DIR="$LINUX_OCCT_DIR" \
            -DOREO_ENABLE_LEGACY_API=OFF

      - name: Build
        run: cmake --build build_nolegacy --parallel

      - name: Test
        run: ctest --test-dir build_nolegacy --output-on-failure

  # ────────────────────────────────────────────────────────────
  # Linux Clang + AddressSanitizer + UndefinedBehaviorSanitizer
  # Catches memory bugs, OOB, use-after-free, integer overflow,
  # null-pointer deref, etc. Tests run slower under ASan/UBSan
  # but the suite is small enough to fit in CI budget.
  # ────────────────────────────────────────────────────────────
  linux-clang-asan-ubsan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld cmake ninja-build \
            libocct-foundation-dev libocct-modeling-algorithms-dev \
            libocct-modeling-data-dev libocct-ocaf-dev \
            libocct-data-exchange-dev libocct-visualization-dev \
            libgtest-dev libeigen3-dev nlohmann-json3-dev \
            libboost-all-dev qt6-base-dev

      - name: Configure (ASan + UBSan)
        run: |
          cmake -S . -B build_san \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH="$LINUX_CMAKE_PREFIX" \
            -DOpenCASCADE_DIR="$LINUX_OCCT_DIR" \
            -DOREO_ENABLE_SANITIZER=address+undefined \
            -DOREO_ENABLE_LEGACY_API=ON

      - name: Build
        run: cmake --build build_san --parallel

      - name: Test (sanitizers active)
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build_san --output-on-failure

  # ────────────────────────────────────────────────────────────
  # libFuzzer smoke run (60s per harness). Catches crashes and
  # divergent corpora; deeper runs are scheduled separately.
  # ────────────────────────────────────────────────────────────
  linux-clang-fuzz:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld cmake ninja-build \
            libocct-foundation-dev libocct-modeling-algorithms-dev \
            libocct-modeling-data-dev libocct-ocaf-dev \
            libocct-data-exchange-dev libocct-visualization-dev \
            libgtest-dev libeigen3-dev nlohmann-json3-dev \
            libboost-all-dev qt6-base-dev

      - name: Configure (libFuzzer)
        run: |
          cmake -S . -B build_fuzz \
            -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH="$LINUX_CMAKE_PREFIX" \
            -DOpenCASCADE_DIR="$LINUX_OCCT_DIR" \
            -DOREO_BUILD_FUZZERS=ON \
            -DOREO_ENABLE_SANITIZER=address+undefined \
            -DOREO_ENABLE_LEGACY_API=ON

      - name: Build fuzzers
        run: |
          cmake --build build_fuzz --parallel \
            --target fuzz_deserialize fuzz_step_import fuzz_feature_tree_json

      - name: Smoke-run fuzzers (60s each)
        run: |
          set -e
          for h in fuzz_deserialize fuzz_step_import fuzz_feature_tree_json; do
            echo "=== running $h ==="
            ./build_fuzz/fuzzers/$h \
              -max_total_time=60 \
              -timeout=10 \
              -rss_limit_mb=2048 \
              corpora/$h/ || (echo "$h crashed"; exit 1)
          done

      - name: Upload crash reproducers (if any)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzer-crashes
          path: |
            crash-*
            leak-*
            timeout-*
          if-no-files-found: ignore

  # ────────────────────────────────────────────────────────────
  # Windows MSVC build + tests using the runner's preinstalled
  # vcpkg (at $VCPKG_INSTALLATION_ROOT, typically C:/vcpkg). The
  # repo's vcpkg.json drives manifest mode — vcpkg installs OCCT,
  # Boost, Eigen, Qt6, nlohmann-json on first run and caches them.
  # ────────────────────────────────────────────────────────────
  windows-msvc:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build_msvc/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build_msvc `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DOREO_ENABLE_LEGACY_API=ON

      - name: Build
        run: cmake --build build_msvc --config Release

      - name: Test
        shell: pwsh
        run: ctest --test-dir build_msvc -C Release --output-on-failure
