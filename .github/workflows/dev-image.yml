# SPDX-License-Identifier: LGPL-2.1-or-later
#
# dev-image.yml — Build + push the oreo-kernel-dev container to GHCR.
#
# This image is the development environment: toolchain (gcc, clang,
# cmake, ninja, sanitizers, gdb), source-built OCCT 7.9.3 pinned to
# match vcpkg, and all third-party deps. It does NOT contain
# oreo-kernel itself — that's the role of the `release` target (see
# .github/workflows/release.yml).
#
# When it runs:
#   * Manually via the "Run workflow" button — use this to bootstrap
#     the image the first time, after which CI can reference it.
#   * Automatically on any push to main that touches docker/Dockerfile
#     or this workflow file itself, so ci.yml never references a stale
#     image after a dependency bump.
#
# Output (pushed to GHCR under the repo owner):
#   * oreo-kernel-dev:latest
#   * oreo-kernel-dev:<commit-sha>   (pinned, for reproducibility)
#   * oreo-kernel-dev:buildcache     (BuildKit cache, not for consumption)
#
# Required repo settings for publishing:
#   Settings → Actions → General → Workflow permissions: "Read and
#   write permissions" (so GITHUB_TOKEN can push to GHCR).
#   Settings → Packages → visibility Public so CI on PRs from forks
#   can pull it without credentials.
#
# First-run cost: ~45-60 min (building OCCT from source is the slow
# step). Subsequent runs re-use the BuildKit cache and complete in
# ~5-10 min, UNLESS OCCT_TAG or the occt-builder stage change, in
# which case we pay the OCCT rebuild again (intentional).

name: dev-image

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile'
      - '.github/workflows/dev-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          owner_lower=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lower}/oreo-kernel-dev" >> "$GITHUB_OUTPUT"
          echo "owner_lower=${owner_lower}" >> "$GITHUB_OUTPUT"

      # Build only the `dev` stage (toolchain + OCCT + deps, no
      # oreo-kernel sources). Subsequent release.yml runs reuse the
      # same occt-builder + dev layers via the BuildKit registry
      # cache, so only the oreo-kernel compile cost is paid on release.
      - name: Build + push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: dev
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache,mode=max
          provenance: false

      - name: Summary
        run: |
          {
            echo "### Pushed images"
            echo "- \`${{ steps.tags.outputs.image }}:latest\`"
            echo "- \`${{ steps.tags.outputs.image }}:${{ github.sha }}\`"
            echo
            echo "ci.yml references the \`:latest\` tag."
            echo "release.yml reuses the \`:buildcache\` layers when building the consumer image."
          } >> "$GITHUB_STEP_SUMMARY"
