#
# dev-image.yml — Build + push the oreo-kernel-dev container to GHCR.
#
# When it runs:
#   * Manually via the "Run workflow" button (use this to bootstrap the
#     image the first time, after which CI can reference it).
#   * Automatically on any push to main that touches the Dockerfile or
#     this workflow file (so ci.yml never references a stale image
#     after a dep bump).
#
# Output: ghcr.io/<owner>/oreo-kernel-dev:latest plus a SHA-tagged
# variant for reproducibility (ghcr.io/<owner>/oreo-kernel-dev:<sha>).
# The owner is auto-derived from ${{ github.repository_owner }} so the
# workflow works across forks without edits.
#
# Required repo permissions:
#   Settings → Actions → General → Workflow permissions → "Read and
#   write permissions" (so GITHUB_TOKEN can push to GHCR).
#   Settings → Packages → make the package public after first push if
#   you want CI on PRs from forks to be able to pull it.

name: dev-image

on:
  push:
    branches: [main]
    paths:
      - 'docker/Dockerfile'
      - '.github/workflows/dev-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          owner_lower=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lower}/oreo-kernel-dev" >> "$GITHUB_OUTPUT"
          echo "owner_lower=${owner_lower}" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.image }}:latest
            ${{ steps.tags.outputs.image }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache,mode=max
          provenance: false

      - name: Summary
        run: |
          echo "### Pushed images" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.tags.outputs.image }}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.tags.outputs.image }}:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "ci.yml references the \`:latest\` tag." >> "$GITHUB_STEP_SUMMARY"
